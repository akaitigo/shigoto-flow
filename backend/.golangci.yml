version: "2"

run:
  timeout: 5m

linters:
  # gofmt/goimports are configured under "formatters" (golangci-lint v2 treats
  # them as formatters, not linters). gosimple was merged into staticcheck in v2.
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/akaitigo/shigoto-flow
