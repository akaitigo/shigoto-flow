services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shigoto
      POSTGRES_PASSWORD: shigoto_dev
      POSTGRES_DB: shigoto_flow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shigoto -d shigoto_flow"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
